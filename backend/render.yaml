    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_NFCT9Xc1nvOq@ep-gentle-river-aq8gpape.c-8.us-east-1.aws.neon.tech/neondb?sslmode=require
      - key: SECRET_KEY
        value: mysecretkey123
